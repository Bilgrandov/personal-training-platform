<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>personal-training-platform</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Main -->
    <main class="container">
        <!-- Theory-Panel  -->
        <div class="theory-panel" id="theory-panel">
            <div class="theory-header">
                <h2>📚 Modul 1</h2>
                <button class="toggle-panel">Tutup</button>
            </div>
            <div class="theory-content" id="theory-content">
                <h3>Pengenalan DOM</h3>
                <p>Penjelasan Materi</p>
                <br>
                <h4>Tantangan</h4>
                <p>Buat Tombol yang memunculkan teks tersembunyi</p>
            </div>
            <div class="theory-footer">
                <button class="btn-prev">Sebelumnya</button>
                <button class="btn-next">Selanjutnya</button>
            </div>
        </div>

        <div class="resizer" id="drag-handle"></div>

        <!-- left-panel: Editor -->
        <div class="editor-panel">
            <!-- Button Buka Materi -->
            <div style="display: flex; gap: 15px; align-items: center; margin-bottom: 5px;">
                <button id="toggle-materi"
                    style="padding: 5px 10px; cursor: pointer; background: #ff9f1c; border: none; border-radius: 4px; font-weight: bold;">📖
                    Materi</button>
            </div>

            <h3>HTML</h3>
            <textarea id="html-code" placeholder="Ketik HTML disini..."></textarea>

            <h3>CSS</h3>
            <textarea id="css-code" placeholder="Ketik CSS disini..."></textarea>

            <h3>JavaScript</h3>
            <textarea id="js-code" placeholder="Ketik JavaScript disini..."></textarea>
        </div>

        <!-- right-panel: Output -->

        <div class="output-panel">
            <h3>Live Preview</h3>
            <iframe id="output"></iframe>
        </div>
    </main>

    <!-- Execute Js -->
    <script src="lesson.js"></script>
    <script src="script.js"></script>
</body>

</html>
