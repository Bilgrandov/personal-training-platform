<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>personal-training-platform</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Header -->
    <header class="header">
        <h1>My Training Platform</h1>
        <p class="challenge-text">
            Tantangan: Buat tombol yang memunculkan teks tersembunyi
        </p>
    </header>

    <!-- Main -->
    <main class="container">

        <!-- left-panel: Editor -->
        <div class="editor-panel">
            <h3>HTML</h3>
            <textarea id="html-code" placeholder="Ketik HTML disini..."></textarea>

            <h3>CSS</h3>
            <textarea id="css-code" placeholder="Ketik HTML disini..."></textarea>

            <h3>JavaScript</h3>
            <textarea id="js-code" placeholder="Ketik HTML disini..."></textarea>
        </div>

        <!-- right-panel: Output -->

        <div class="output-panel">
            <h3>Live Preview</h3>
            <iframe id="output"></iframe>
        </div>
    </main>

    <!-- Execute Logic -->
    <script src="script.js"></script>
</body>

</html>
