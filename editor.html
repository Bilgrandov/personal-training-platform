<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Interactive Editor - Developer Portal</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Main Workspace -->
    <main class="container">
        <!-- Theory-Panel (Sidebar) -->
        <div class="theory-panel" id="theory-panel">
            <div class="theory-header">
                <h2>📚 Kurikulum</h2>
                <button class="toggle-panel">Tutup</button>
            </div>
            <div class="theory-content" id="theory-content">
                <!-- Content injected dynamically via script.js -->
            </div>
            <div class="theory-footer">
                <button class="btn-prev">⬅️ Sebelum</button>
                <button class="btn-next">Lanjut ➡️</button>
            </div>
        </div>

        <!-- Draggable Resizer Handle -->
        <div class="resizer" id="drag-handle"></div>

        <!-- Editor Panel -->
        <div class="editor-panel">
            <!-- Navigation Buttons -->
            <div class="editor-nav">
                <a href="index.html" class="nav-btn-secondary">🏠 Dashboard</a>
                <button id="toggle-materi" class="nav-btn-primary">📖 Materi</button>
            </div>

            <!-- HTML Editor Group -->
            <div class="editor-group">
                <div class="editor-tab">
                    <span class="tab-dot html-dot"></span>
                    <span>index.html</span>
                </div>
                <textarea id="html-code" placeholder="Ketik HTML di sini..." spellcheck="false"></textarea>
            </div>

            <!-- CSS Editor Group -->
            <div class="editor-group">
                <div class="editor-tab">
                    <span class="tab-dot css-dot"></span>
                    <span>style.css</span>
                </div>
                <textarea id="css-code" placeholder="Ketik CSS di sini..." spellcheck="false"></textarea>
            </div>

            <!-- JavaScript Editor Group -->
            <div class="editor-group">
                <div class="editor-tab">
                    <span class="tab-dot js-dot"></span>
                    <span>script.js</span>
                </div>
                <textarea id="js-code" placeholder="Ketik JavaScript di sini..." spellcheck="false"></textarea>
            </div>
        </div>

        <!-- Output Panel -->
        <div class="output-panel">
            <h3>Live Viewport</h3>
            <iframe id="output"></iframe>

            <!-- Custom Sandbox Terminal Console -->
            <div class="console-panel">
                <div class="console-header">
                    <span class="console-title">🖥️ Terminal Sandbox</span>
                    <button id="clear-console" class="console-clear-btn">Clear</button>
                </div>
                <div id="console-output" class="console-body">
                    <div class="console-line console-system">> Ready. Console logs and errors will show here.</div>
                </div>
            </div>
        </div>
    </main>

    <!-- Project Data & Engine Scripts -->
    <script src="lesson.js"></script>
    <script src="script.js"></script>
</body>

</html>
